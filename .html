<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>අකාලික පාරමිතා - නිල ප්‍රකාශනය</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Iskoola+Pota&display=swap');
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Iskoola Pota', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        
        #live-clock {
            font-size: 1.5rem;
            color: #ffd700;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .video-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        video { width: 100%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .playlist {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #4a00e0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #8e2de2; transform: scale(1.02); }

        .download-btn { background: #28a745; margin-top: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="header">
    <h1>අකාලික පාරමිතා</h1>
    <div id="live-clock"></div>
</div>

<div class="container">
    <div class="video-box">
        <video id="player" controls>
            <source src="video1.mp4" type="video/mp4">
        </video>
        <h2 id="video-title">සස ජාතකය</h2>
    </div>

    <div class="playlist">
        <h3>වීඩියෝ එකතුව</h3>
        <button onclick="changeVideo('video1.mp4', 'සස ජාතකය')">සස ජාතකය</button>
        <button onclick="changeVideo('video2.mp4', 'අංගුලිමාල')">අංගුලිමාල</button>
        <button onclick="changeVideo('video3.mp4', 'තුන් බිය දුරු කිරීම')">තුන් බිය දුරු කිරීම</button>
        <button onclick="changeVideo('video4.mp4', 'නාලාගිරි දමනය')">නාලාගිරි දමනය</button>
        <a href="video1.mp4" download><button class="download-btn">සස ජාතකය බාගත කරන්න</button></a>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleDateString() + " | " + now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function changeVideo(file, title) {
        const player = document.getElementById('player');
        player.src = file;
        document.getElementById('video-title').innerText = title;
        player.play();
    }
</script>

</body>
</html>
