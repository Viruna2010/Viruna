<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අකාලික පාරමිතා</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Iskoola+Pota&display=swap');
        
        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1545558014-86980a7e6301?auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            min-height: 100vh;
            color: #ffcc00;
            font-family: 'Iskoola Pota', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* පසුබිමේ අකුරු පා වෙන විදිහ */
        .bg-letters {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.1;
            font-size: 50px;
            pointer-events: none;
            display: flex; flex-wrap: wrap; justify-content: space-around;
        }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 3rem; text-shadow: 0 0 20px #ffcc00; }

        .video-wrapper {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #ffcc00;
            max-width: 800px;
            width: 90%;
        }

        iframe { width: 100%; height: 450px; border-radius: 10px; border: none; }

        .footer-box { margin-top: 30px; text-align: center; color: white; }
        
        .dl-btn {
            display: block;
            margin-top: 20px;
            padding: 15px;
            background: #b38600;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .dl-btn:hover { background: #ffcc00; color: #000; }
    </style>
</head>
<body>

    <div class="bg-letters">
        <span>ස</span><span>ධ</span><span>ම්</span><span>ම</span><span>ප</span><span>ා</span><span>ල</span><span>ී</span>
    </div>

    <div class="header">
        <h1>අකාලික පාරමිතා</h1>
    </div>

    <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/bMwZAi-xopU" allowfullscreen></iframe>
        <a href="https://yt1d.net/en11/" target="_blank" class="dl-btn">වීඩියෝව බාගත කරගන්න</a>
    </div>

    <div class="footer-box">
        <p>created by viruna randinu</p>
    </div>

</body>
</html>
