<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>අකාලික පාරමිතා</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Iskoola+Pota&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            font-family: 'Iskoola Pota', sans-serif;
            color: #ffcc00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* පාවෙන ආලෝක බලපෑම */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .particle { position: absolute; background: rgba(255, 204, 0, 0.1); border-radius: 50%; animation: float 15s infinite; }

        @keyframes float { 0% { transform: translateY(100vh); } 100% { transform: translateY(-100px); } }

        .container { text-align: center; width: 90%; max-width: 800px; }
        h1 { font-size: 3rem; margin-bottom: 20px; text-shadow: 0 0 15px #ffcc00; }

        .video-box { 
            background: rgba(0,0,0,0.8); 
            padding: 10px; 
            border: 2px solid #ffcc00; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(255,204,0,0.3);
        }

        iframe { width: 100%; height: 450px; border-radius: 10px; border: none; }

        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #ffcc00; background: transparent; color: #ffcc00; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { background: #ffcc00; color: #000; }

        footer { margin-top: 40px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="particles">
        <div class="particle" style="width: 20px; height: 20px; left: 10%;"></div>
        <div class="particle" style="width: 30px; height: 30px; left: 50%; animation-delay: 2s;"></div>
        <div class="particle" style="width: 15px; height: 15px; left: 80%; animation-delay: 5s;"></div>
    </div>

    <div class="container">
        <h1>අකාලික පාරමිතා</h1>
        <div class="video-box">
            <iframe src="https://youtu.be/5l3qWxueq04" allowfullscreen></iframe>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="copyLink()">Copy Link</button>
            <a href="https://yt1d.net/en11/" target="_blank" class="btn" style="text-decoration:none; padding-top:15px;">වීඩියෝව බාගන්න</a>
        </div>

        <footer>Created by Viruna Randinu</footer>
    </div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText("https://youtu.be/bMwZAi-xopU");
            alert("ලින්ක් එක කොපි වුණා!");
        }
    </script>
</body>
</html>
