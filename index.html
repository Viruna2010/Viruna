<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අකාලික පාරමිතා - නිල ප්‍රකාශනය</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Iskoola+Pota&display=swap');
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #ffffff;
            font-family: 'Iskoola Pota', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 50px;
            border: 1px solid #ffcc00;
            margin-bottom: 30px;
            text-align: center;
        }

        .video-wrapper {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ffcc00;
            max-width: 800px;
            width: 100%;
        }

        iframe { width: 100%; height: 450px; border-radius: 10px; border: none; }

        .action-box {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            color: #000;
        }

        .copy-btn { background: #ffcc00; }
        .dl-btn { background: #27ae60; color: #fff; }
        
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="header">
        <h1>අකාලික පාරමිතා</h1>
    </div>

    <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/bMwZAi-xopU" allowfullscreen></iframe>
        
        <div class="action-box">
            <button class="btn copy-btn" onclick="copyLink()">Copy Link</button>
            <a href="https://yt1d.net/en11/" target="_blank" class="btn dl-btn">මෙතැනින් බාගන්න</a>
        </div>
    </div>

    <script>
        function copyLink() {
            const link = "https://youtu.be/bMwZAi-xopU";
            navigator.clipboard.writeText(link);
            alert("ලින්ක් එක කොපි වුණා!");
        }
    </script>
</body>
</html>
