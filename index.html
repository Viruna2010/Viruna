<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අකාලික පාරමිතා - නිල ප්‍රකාශනය</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Iskoola+Pota&display=swap');
        
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1545558014-86980a7e6301?auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #f4f4f4;
            font-family: 'Iskoola Pota', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { 
            background: rgba(0,0,0,0.6); 
            padding: 25px 40px; 
            border-radius: 20px; 
            border-bottom: 3px solid #ffcc00; 
            margin-bottom: 30px;
            text-align: center;
        }
        
        #date-time { font-size: 1.4rem; color: #ffcc00; margin-top: 5px; text-shadow: 0 0 10px #ffcc00; }

        .main-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        .video-player { 
            background: rgba(0,0,0,0.7); 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid #ffcc00; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        iframe { width: 100%; height: 500px; border-radius: 12px; }

        .menu-list { 
            background: rgba(255,255,255,0.05); 
            padding: 25px; 
            border-radius: 20px; 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        button {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            background: #4a3700;
            color: #ffcc00;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.4s;
            border-left: 6px solid #ffcc00;
            text-align: left;
        }

        button:hover { background: #ffcc00; color: #000; font-weight: bold; transform: translateX(5px); }
        
        footer { margin-top: 40px; font-size: 0.9rem; color: #aaa; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>අකාලික පාරමිතා</h1>
        <div id="date-time"></div>
    </div>

    <div class="main-wrapper">
        <div class="video-player">
            <iframe id="videoPlayer" src="https://www.youtube.com/embed/ZATfWmX9G6E" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="menu-list">
            <h3>දේශනා මාලාව</h3>
            <button onclick="changeVideo('ZATfWmX9G6E')">බුද්ධ චරිතය</button>
            <button onclick="changeVideo('VIDEO_ID_2')">අංගුලිමාල දමනය</button>
            <button onclick="changeVideo('VIDEO_ID_3')">නාලාගිරි දමනය</button>
            <button onclick="changeVideo('VIDEO_ID_4')">සස ජාතකය</button>
        </div>
    </div>

    <footer>තථාගතයන් වහන්සේගේ ශ්‍රී සද්ධර්මය - අකාලික පාරමිතා Project 2026</footer>

    <script>
        function updateDisplay() {
            const now = new Date();
            document.getElementById('date-time').innerText = now.toLocaleDateString() + " | " + now.toLocaleTimeString();
        }
        setInterval(updateDisplay, 1000);
        updateDisplay();

        function changeVideo(id) {
            document.getElementById('videoPlayer').src = "https://www.youtube.com/embed/" + id;
        }
    </script>
</body>
</html>
