<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>අකාලික පාරමිතා - නිල ප්‍රකාශනය</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Iskoola+Pota&display=swap');
        
        body {
            /* බෞද්ධ පසුබිම: සන්සුන් නිල්/ගෝල්ඩන් මිශ්‍රණය */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1545558014-86980a7e6301?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Iskoola Pota', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .header { background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px; border-bottom: 2px solid #ffcc00; display: inline-block; }
        
        #date-time { font-size: 1.5rem; color: #ffcc00; margin-top: 10px; font-weight: bold; }

        .main-wrapper {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            max-width: 1200px;
            margin: 30px auto;
        }

        .video-player { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 20px; border: 1px solid #ffcc00; }
        iframe { width: 100%; height: 500px; border-radius: 10px; }

        .menu-list { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); }
        
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #b8860b;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            border-left: 5px solid #ffcc00;
        }

        button:hover { background: #ffcc00; color: #000; }
        
        footer { margin-top: 50px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <h1>අකාලික පාරමිතා</h1>
        <div id="date-time"></div>
    </div>

    <div class="main-wrapper">
        <div class="video-player">
            <iframe id="videoPlayer" src="https://www.youtube.com/embed/YOUR_ID_HERE" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="menu-list">
            <h3>දේශනා මාලාව</h3>
            <button onclick="changeVideo('ID1')">සස ජාතකය</button>
            <button onclick="changeVideo('ID2')">අංගුලිමාල දමනය</button>
            <button onclick="changeVideo('ID3')">නාලාගිරි දමනය</button>
            <button onclick="changeVideo('ID4')">කරුණා ගුණය</button>
        </div>
    </div>

    <footer>තථාගතයන් වහන්සේගේ ශ්‍රී සද්ධර්මය - අකාලික පාරමිතා Project 2026</footer>

    <script>
        function updateDisplay() {
            const now = new Date();
            document.getElementById('date-time').innerText = now.toLocaleDateString() + " | " + now.toLocaleTimeString();
        }
        setInterval(updateDisplay, 1000);
        updateDisplay();

        function changeVideo(id) {
            document.getElementById('videoPlayer').src = "https://www.youtube.com/embed/" + id;
        }
    </script>
</body>
</html>
