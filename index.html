<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>අකාලික පාරමිතා - නිල ප්‍රකාශනය</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Iskoola+Pota&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
            color: #e0e0e0;
            font-family: 'Iskoola Pota', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 40px; }
        
        #live-clock {
            font-size: 1.8rem;
            color: #00d4ff;
            text-shadow: 0 0 10px #00d4ff;
            margin-top: 10px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        .viewer-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }

        .placeholder-text { color: #555; font-size: 1.5rem; }

        .sidebar {
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            background: linear-gradient(90deg, #4a00e0, #8e2de2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.4s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(142,45,226,0.4); }
    </style>
</head>
<body>

<div class="header">
    <h1>අකාලික පාරමිතා</h1>
    <div id="live-clock"></div>
</div>

<div class="main-container">
    <div class="viewer-box">
        <div class="placeholder-text">වීඩියෝ දර්ශනයක් තෝරන්න...</div>
        <p id="status-text" style="color: #00d4ff;">සිස්ටම් එක ක්‍රියාකාරීයි (Ready)</p>
    </div>

    <div class="sidebar">
        <h3>ජාතක කතා දර්ශකය</h3>
        <button onclick="updateStatus('සස ජාතකය ප්ලේ වෙමින් පවතී...')">සස ජාතකය</button>
        <button onclick="updateStatus('අංගුලිමාල දර්ශනය ප්ලේ වෙමින් පවතී...')">අංගුලිමාල</button>
        <button onclick="updateStatus('තුන් බිය දුරු කිරීම ප්ලේ වෙමින් පවතී...')">තුන් බිය දුරු කිරීම</button>
        <button onclick="updateStatus('නාලාගිරි දමනය ප්ලේ වෙමින් පවතී...')">නාලාගිරි දමනය</button>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function updateStatus(msg) {
        document.getElementById('status-text').innerText = msg;
    }
</script>

</body>
</html>
